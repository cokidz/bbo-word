<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영어 단어 맞추기</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0e17; --card:#1a1828; --accent:#ff6b6b; --accent2:#ffd93d;
  --accent4:#4d96ff; --text:#fffffe; --muted:#a7a9be;
  --correct:#6bcb77; --wrong:#ff6b6b; --blank-bg:#2a2840; --blank-border:#4d96ff;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:flex-start; padding:24px 20px 48px;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(77,150,255,.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(255,107,107,.08) 0%, transparent 60%);
}
.top-row { width:100%; max-width:520px; display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
h1 { font-family:'Fredoka One',cursive; font-size:clamp(1.6rem,5vw,2.4rem);
     background:linear-gradient(90deg,var(--accent2),var(--accent4));
     -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.subtitle { color:var(--muted); font-size:.9rem; margin-bottom:20px; text-align:center; font-weight:600; width:100%; max-width:520px; }
.progress-bar-wrap { width:100%; max-width:520px; height:8px; background:var(--blank-bg); border-radius:99px; margin-bottom:16px; overflow:hidden; display:none; }
.progress-bar { height:100%; background:linear-gradient(90deg,var(--accent4),var(--accent2)); border-radius:99px; transition:width .5s cubic-bezier(.4,2,.5,1); }
.score-bar { display:none; justify-content:center; gap:20px; margin-bottom:16px; font-size:.85rem; font-weight:700; color:var(--muted); width:100%; max-width:520px; }
.score-bar span { display:flex; align-items:center; gap:5px; }
.dot { width:8px; height:8px; border-radius:50%; }
.card { background:var(--card); border-radius:24px; padding:32px 28px 28px; width:100%; max-width:520px;
        box-shadow:0 8px 40px rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.04) inset;
        border:1px solid rgba(255,255,255,.06); position:relative; }
#setupScreen { display:flex; flex-direction:column; gap:20px; }
.setup-title { font-family:'Fredoka One',cursive; font-size:1.4rem; color:var(--accent2); margin-bottom:4px; }
.setup-desc  { font-size:.85rem; color:var(--muted); font-weight:600; line-height:1.6; }
.field-label { font-size:.75rem; font-weight:800; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
.input-row { display:flex; gap:8px; }
.txt-input { flex:1; background:rgba(255,255,255,.07); border:1.5px solid rgba(255,255,255,.12);
             color:var(--text); font-family:'Nunito',sans-serif; font-size:.85rem; font-weight:600;
             padding:11px 14px; border-radius:12px; outline:none; transition:border-color .2s; }
.txt-input::placeholder { color:rgba(255,255,255,.22); }
.txt-input:focus { border-color:var(--accent4); }
.btn-load { padding:11px 18px; border-radius:12px; border:none;
            background:linear-gradient(135deg,var(--accent4),#6a5acd);
            color:white; font-family:'Fredoka One',cursive; font-size:1rem;
            cursor:pointer; transition:all .2s; white-space:nowrap; }
.btn-load:hover { transform:translateY(-1px); }
.btn-load:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.divider { height:1px; background:rgba(255,255,255,.07); }
.lesson-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(76px,1fr)); gap:8px; }
.lesson-btn { padding:10px 6px; border-radius:12px; border:2px solid rgba(255,255,255,.1);
              background:rgba(255,255,255,.05); color:var(--muted);
              font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; transition:all .18s; text-align:center; }
.lesson-btn:hover  { background:rgba(77,150,255,.18); color:var(--accent4); border-color:var(--accent4); }
.lesson-btn.active { background:rgba(77,150,255,.22); color:var(--accent4); border-color:var(--accent4); }
.lesson-btn.wrong-mode { border-color:var(--accent); color:var(--accent); background:rgba(255,107,107,.15); }
.lesson-btn.wrong-mode.active { background:rgba(255,107,107,.3); }
.hint-text { font-size:.75rem; color:var(--muted); margin-top:5px; line-height:1.5; }
.btn-start { width:100%; padding:15px; border-radius:16px; border:none;
             background:linear-gradient(135deg,var(--accent4),#6a5acd);
             color:white; font-family:'Fredoka One',cursive; font-size:1.25rem;
             letter-spacing:1px; cursor:pointer; transition:all .2s;
             box-shadow:0 4px 24px rgba(77,150,255,.35); }
.btn-start:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 32px rgba(77,150,255,.45); }
.btn-start:disabled { opacity:.35; cursor:not-allowed; transform:none; }
.setup-error { font-size:.82rem; font-weight:700; text-align:center; min-height:18px; white-space:pre-line; }
.setup-error.err { color:var(--wrong); }
.setup-error.ok  { color:var(--correct); }
.wrong-section-title { font-family:'Fredoka One',cursive; font-size:1rem; color:var(--accent); margin-bottom:8px; }
.wrong-count-info { font-size:.8rem; color:var(--muted); font-weight:600; margin-bottom:8px; }
#quizScreen { display:none; flex-direction:column; }
.word-number { position:absolute; top:18px; right:22px; font-size:.78rem; color:var(--muted); font-weight:700; }
.badge-row { text-align:center; margin-bottom:6px; min-height:26px; }
.lesson-tag { display:inline-block; background:rgba(77,150,255,.15); color:var(--accent4); font-size:.72rem; font-weight:800; padding:3px 10px; border-radius:99px; }
.retry-badge { display:none; background:rgba(255,107,107,.18); color:var(--accent); font-size:.72rem; font-weight:800; padding:3px 10px; border-radius:99px; margin-left:6px; }
.korean-hint { text-align:center; margin-bottom:24px; margin-top:8px; }
.korean-label { font-size:.72rem; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
.korean-word  { font-size:clamp(2rem,7vw,3rem); font-family:'Fredoka One',cursive; color:var(--accent2); line-height:1; text-shadow:0 0 30px rgba(255,217,61,.3); }
.word-display { display:flex; justify-content:center; align-items:center; gap:6px; margin-bottom:28px; flex-wrap:wrap; }
.letter-box { width:44px; height:52px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.6rem; font-family:'Fredoka One',cursive; transition:all .3s; }
.letter-shown { background:rgba(255,255,255,.06); color:var(--text); border:2px solid rgba(255,255,255,.1); }
.letter-blank { background:var(--blank-bg); border:2.5px dashed var(--blank-border); color:transparent; }
.letter-blank.filled  { border-style:solid; border-color:var(--accent4); color:var(--accent4); background:rgba(77,150,255,.12); }
.letter-blank.correct { border-color:var(--correct); color:var(--correct); background:rgba(107,203,119,.12); animation:pop .3s ease; }
.letter-blank.wrong   { border-color:var(--wrong);   color:var(--wrong);   background:rgba(255,107,107,.12); animation:shake .4s ease; }
@keyframes pop   { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} 80%{transform:translateX(-3px)} }
.keyboard { display:flex; flex-direction:column; gap:8px; align-items:center; margin-bottom:18px; }
.key-row  { display:flex; gap:6px; justify-content:center; }
.key { width:36px; height:46px; border-radius:10px; border:none; background:rgba(255,255,255,.08);
       color:var(--text); font-family:'Nunito',sans-serif; font-size:.95rem; font-weight:800;
       cursor:pointer; transition:all .15s; border-bottom:3px solid rgba(0,0,0,.3); }
.key:hover  { background:rgba(77,150,255,.25); transform:translateY(-2px); border-bottom-color:var(--accent4); }
.key:active { transform:translateY(1px); border-bottom-width:1px; }
.key-delete { width:58px; font-size:.82rem; background:rgba(255,107,107,.12); color:var(--accent); border-bottom-color:rgba(255,107,107,.3); }
.key-delete:hover { background:rgba(255,107,107,.25); border-bottom-color:var(--accent); }
.btn-check { width:100%; padding:13px; border-radius:14px; border:none;
             background:linear-gradient(135deg,var(--accent4),#6a5acd);
             color:white; font-family:'Fredoka One',cursive; font-size:1.15rem;
             letter-spacing:1px; cursor:pointer; transition:all .2s; box-shadow:0 4px 20px rgba(77,150,255,.3); }
.btn-check:hover:not(:disabled) { transform:translateY(-2px); }
.btn-check:disabled { opacity:.4; cursor:not-allowed; transform:none; }
.btn-next { width:100%; padding:13px; border-radius:14px; border:none;
            background:linear-gradient(135deg,var(--correct),#38a844);
            color:white; font-family:'Fredoka One',cursive; font-size:1.15rem;
            cursor:pointer; transition:all .2s; box-shadow:0 4px 20px rgba(107,203,119,.3);
            margin-top:10px; display:none; }
.btn-next:hover { transform:translateY(-2px); }
.feedback { text-align:center; margin-top:14px; font-size:1.05rem; font-weight:800; min-height:26px; }
.feedback.correct { color:var(--correct); }
.feedback.wrong   { color:var(--wrong); }
#resultScreen { display:none; flex-direction:column; align-items:center; text-align:center; gap:14px; }
.result-emoji { font-size:3.5rem; }
.result-title { font-family:'Fredoka One',cursive; font-size:1.8rem;
                background:linear-gradient(90deg,var(--accent2),var(--accent));
                -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.result-score { font-size:3rem; font-family:'Fredoka One',cursive; color:var(--accent4); }
.result-list  { width:100%; display:flex; flex-direction:column; gap:6px; text-align:left; max-height:220px; overflow-y:auto; }
.result-item  { display:flex; justify-content:space-between; align-items:center; padding:8px 14px; border-radius:10px; font-weight:700; font-size:.9rem; }
.result-item.ok   { background:rgba(107,203,119,.12); color:var(--correct); }
.result-item.fail { background:rgba(255,107,107,.12); color:var(--wrong); }
.result-item .word-ans { color:var(--text); font-size:.82rem; opacity:.7; }
.wc-badge { font-size:.7rem; background:rgba(255,107,107,.2); color:var(--wrong); padding:1px 7px; border-radius:99px; margin-left:4px; }
.saving-msg { font-size:.8rem; color:var(--muted); font-weight:600; min-height:18px; }
.result-btn-col { display:flex; flex-direction:column; gap:8px; width:100%; }
.result-btn-row { display:flex; gap:8px; }
.btn-r { flex:1; padding:12px; border-radius:14px; border:none; font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; transition:all .2s; }
.btn-r:hover:not(:disabled) { transform:translateY(-2px); }
.btn-r:disabled { opacity:.3; cursor:not-allowed; transform:none; }
.btn-retry-wrong { background:linear-gradient(135deg,var(--accent),#c0392b); color:white; }
.btn-again  { background:linear-gradient(135deg,var(--accent2),#f4a261); color:#0f0e17; }
.btn-home   { background:rgba(255,255,255,.08); color:var(--muted); }
.btn-home:hover { background:rgba(255,255,255,.14); color:var(--text); }
.loading-overlay { position:absolute; inset:0; background:rgba(26,24,40,.88); border-radius:24px;
                   display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:10; }
.spinner { width:36px; height:36px; border:3px solid rgba(255,255,255,.1); border-top-color:var(--accent4); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-msg { font-size:.9rem; font-weight:700; color:var(--muted); }

.btn-quit {
  position: absolute; top: 18px; left: 22px;
  background: rgba(255,255,255,.07); border: 1.5px solid rgba(255,255,255,.1);
  color: var(--muted); font-family: 'Fredoka One', cursive; font-size: .85rem;
  padding: 5px 12px; border-radius: 99px; cursor: pointer; transition: all .2s;
}
.btn-quit:hover { background: rgba(255,107,107,.2); color: var(--accent); border-color: var(--accent); }
  
  
</style>
</head>
<body>
<div class="top-row"><h1>🔤 Word Spell</h1></div>
<p class="subtitle">한국어를 보고 영어 스펠링을 완성하세요!</p>
<div class="progress-bar-wrap" id="progressWrap">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>
<div class="score-bar" id="scoreBar">
  <span><span class="dot" style="background:var(--correct)"></span><span id="correctCount">0</span> 정답</span>
  <span><span class="dot" style="background:var(--wrong)"></span><span id="wrongCount">0</span> 오답</span>
</div>
<div class="card" id="mainCard">
  <div class="loading-overlay" id="loadingOverlay" style="display:none">
    <div class="spinner"></div>
    <div class="loading-msg" id="loadingMsg">불러오는 중…</div>
  </div>
  <!-- SETUP -->
  <div id="setupScreen">
    <div>
      <div class="setup-title">👋 설정</div>
      <div class="setup-desc">Apps Script 배포 URL을 입력하고<br>레슨을 선택한 뒤 시작하세요!</div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="field-label">Apps Script 배포 URL</div>
      <div class="input-row">
        <input class="txt-input" id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec" />
        <button class="btn-load" id="btnLoad">불러오기</button>
      </div>
      <div class="hint-text">Apps Script 배포 URL을 입력하세요 (apps_script.gs 참고)</div>
    </div>
    <div id="lessonSection" style="display:none">
      <div class="field-label">📖 레슨 선택</div>
      <div class="lesson-grid" id="lessonGrid"></div>
    </div>
    <div id="wrongSection" style="display:none">
      <div class="divider" style="margin-bottom:16px"></div>
      <div class="wrong-section-title">❌ 오답노트</div>
      <div class="wrong-count-info" id="wrongCountInfo"></div>
      <div class="lesson-grid" id="wrongGrid"></div>
    </div>
    <div class="setup-error" id="setupError"></div>
    <button class="btn-start" id="btnStart" disabled>시작하기 →</button>
  </div>
  <!-- QUIZ -->
  <div id="quizScreen">
    <span class="word-number" id="wordNumber"></span>
    <button class="btn-quit" id="btnQuit">✕ 나가기</button>
    <div class="badge-row">
      <span class="lesson-tag" id="lessonTag"></span>
      <span class="retry-badge" id="retryBadge">🔁 재도전</span>
    </div>
    <div class="korean-hint">
      <div class="korean-label">뜻</div>
      <div class="korean-word" id="koreanWord"></div>
    </div>
    <div class="word-display" id="wordDisplay"></div>
    <div class="keyboard" id="keyboard"></div>
    <button class="btn-check" id="btnCheck" disabled>확인하기 ✓</button>
    <button class="btn-next"  id="btnNext">다음 단어 →</button>
    <div class="feedback" id="feedback"></div>
  </div>
  <!-- RESULT -->
  <div id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">학습 완료!</div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-list"  id="resultList"></div>
    <div class="saving-msg"   id="savingMsg"></div>
    <div class="result-btn-col">
      <div class="result-btn-row">
        <button class="btn-r btn-retry-wrong" id="btnRetryWrong">❌ 오답만 다시</button>
        <button class="btn-r btn-again" id="btnAgain">🔄 다시 풀기</button>
      </div>
      <button class="btn-r btn-home" id="btnHome">🏠 레슨 선택으로</button>
    </div>
  </div>
</div>

<script>
const KB = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['z','x','c','v','b','n','m','⌫'],
];
const STORE_URL = 'wordspell_api_url';
let API_URL = localStorage.getItem(STORE_URL) || '';
let allWrong = [], quizWords = [], shuffled = [];
let selectedLesson = null, isWrongMode = false;
let currentIdx, currentWord, blanks, userAnswers, checked, sessionResults, isRetry, retryCount;

window.addEventListener('DOMContentLoaded', () => {
  if (API_URL) { $('apiUrl').value = API_URL; loadData(); }
});

$('btnLoad').onclick = loadData;
$('apiUrl').addEventListener('keydown', e => { if(e.key==='Enter') loadData(); });

async function loadData() {
  const url = $('apiUrl').value.trim();
  if (!url) { setErr('URL을 입력해주세요.', true); return; }
  API_URL = url; localStorage.setItem(STORE_URL, url);
  setErr(''); setLoading(true, '데이터 불러오는 중…');
  try {
    const [lr, wr] = await Promise.all([apiFetch('getLessons'), apiFetch('getWrong')]);
    if (lr.error) throw new Error(lr.error);
    allWrong = wr.wrong || [];
    renderLessons(lr.lessons || []);
    renderWrongSection();
    $('lessonSection').style.display = '';
    setErr('✅ 데이터 로드 완료!', false);
  } catch(e) {
    setErr('❌ ' + e.message + '\nApps Script URL을 확인하세요.', true);
  }
  setLoading(false);
}

function renderLessons(list) {
  const g = $('lessonGrid'); g.innerHTML = '';
  ['전체', ...list].forEach(l => {
    const b = document.createElement('button');
    b.className = 'lesson-btn'; b.textContent = l;
    b.onclick = () => selectLesson(l, false, b);
    g.appendChild(b);
  });
}

function renderWrongSection() {
  const ws = $('wrongSection');
  if (!allWrong.length) { ws.style.display = 'none'; return; }
  ws.style.display = '';
  $('wrongCountInfo').textContent = '총 ' + allWrong.length + '개 단어 누적 오답';
  const g = $('wrongGrid'); g.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'lesson-btn wrong-mode'; all.textContent = '전체 오답';
  all.onclick = () => selectLesson('전체 오답', true, all);
  g.appendChild(all);
  const byLesson = {};
  allWrong.forEach(w => { (byLesson[w.lesson] = byLesson[w.lesson]||[]).push(w); });
  Object.entries(byLesson).forEach(([lesson, words]) => {
    const b = document.createElement('button');
    b.className = 'lesson-btn wrong-mode';
    b.textContent = lesson + ' (' + words.length + ')';
    b.onclick = () => selectLesson(lesson, true, b);
    g.appendChild(b);
  });
}

function selectLesson(lesson, wrongMode, btn) {
  selectedLesson = lesson; isWrongMode = wrongMode;
  document.querySelectorAll('.lesson-btn').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  $('btnStart').disabled = false; setErr('');
}

$('btnStart').onclick = beginQuiz;
function beginQuiz() {
  if (!selectedLesson) { setErr('레슨을 선택해주세요.', true); return; }
  if (isWrongMode) {
    quizWords = (selectedLesson === '전체 오답' ? allWrong : allWrong.filter(w => w.lesson === selectedLesson))
      .map(w => ({ ...w, english: String(w.english).toUpperCase() }));
    if (!quizWords.length) { setErr('오답 단어가 없어요.', true); return; }
    startSession(quizWords, false);
  } else {
    fetchAndStart();
  }
}

async function fetchAndStart() {
  setLoading(true, '단어 불러오는 중…');
  try {
    const res = await apiFetch('getWords', { lesson: selectedLesson });
    if (res.error) throw new Error(res.error);
    quizWords = (res.words || []).map(w => ({ ...w, english: String(w.english).toUpperCase() }));
    if (!quizWords.length) { setErr('이 레슨에 단어가 없어요.', true); setLoading(false); return; }
    startSession(quizWords, false);
  } catch(e) { setErr('오류: ' + e.message, true); }
  setLoading(false);
}

function startSession(words, retry) {
  isRetry = !!retry;
  shuffled = shuffle([...words]); currentIdx = 0; sessionResults = [];
  $('correctCount').textContent = 0; $('wrongCount').textContent = 0;
  $('progressWrap').style.display = ''; $('scoreBar').style.display = 'flex';
  $('lessonTag').textContent = (isWrongMode ? '❌ ' : '📖 ') + selectedLesson;
  showScreen('quiz'); loadWord(false);
}

function loadWord(retry) {
  checked = false;
  if (!retry) retryCount = 0;
  currentWord = shuffled[currentIdx];
  blanks = pickBlanks(currentWord.english, retryCount);
  userAnswers = {};
  $('wordNumber').textContent  = (currentIdx+1) + ' / ' + shuffled.length;
  $('koreanWord').textContent  = currentWord.korean;
  $('progressBar').style.width = (currentIdx / shuffled.length * 100) + '%';
  $('feedback').textContent = ''; $('feedback').className = 'feedback';
  $('btnNext').style.display  = 'none';
  $('btnCheck').style.display = 'block';
  $('btnCheck').disabled = true;
  $('retryBadge').style.display = retry ? 'inline-block' : 'none';
  renderWordDisplay(); renderKeyboard();
}

function pickBlanks(word, attempt) {
  const n = Math.max(1, Math.ceil(word.length / 2));
  const indices = [...Array(word.length).keys()];
  const shifted = [...indices.slice(attempt % word.length), ...indices.slice(0, attempt % word.length)];
  return new Set(shifted.slice(0, n));
}

function renderWordDisplay() {
  const c = $('wordDisplay'); c.innerHTML = '';
  [...currentWord.english].forEach((ch, i) => {
    const b = document.createElement('div');
    if (blanks.has(i)) {
      b.className = 'letter-box letter-blank' + (userAnswers[i] ? ' filled' : '');
      b.textContent = userAnswers[i] || '';
    } else {
      b.className = 'letter-box letter-shown';
      b.textContent = ch;
    }
    b.dataset.index = i;
    c.appendChild(b);
  });
}

function renderKeyboard() {
  const kb = $('keyboard'); kb.innerHTML = '';
  KB.forEach(row => {
    const r = document.createElement('div'); r.className = 'key-row';
    row.forEach(k => {
      const b = document.createElement('button');
      b.className = 'key' + (k==='⌫' ? ' key-delete' : '');
      b.textContent = k; b.onclick = () => tap(k);
      r.appendChild(b);
    });
    kb.appendChild(r);
  });
}

function nextBlank() {
  for (let i = 0; i < currentWord.english.length; i++)
    if (blanks.has(i) && !userAnswers[i]) return i;
  return null;
}

function tap(k) {
  if (checked) return;
  if (k === '⌫') {
    const filled = [...blanks].filter(i => userAnswers[i]).sort((a,b) => b-a);
    if (filled.length) { delete userAnswers[filled[0]]; renderWordDisplay(); $('btnCheck').disabled = true; }
    return;
  }
  const n = nextBlank(); if (n === null) return;
  userAnswers[n] = k.toUpperCase(); renderWordDisplay();
  $('btnCheck').disabled = ![...blanks].every(i => userAnswers[i]);
}

document.addEventListener('keydown', e => {
  if ($('quizScreen').style.display === 'none') return;
  const k = e.key.toLowerCase();
  if (k === 'backspace' && !checked) { e.preventDefault(); tap('⌫'); return; }
  if (k === 'enter') {
    if (!checked && !$('btnCheck').disabled) { checkAnswer(); return; }
    if ($('btnNext').style.display !== 'none') { nextWord(); return; }
  }
  if (/^[a-z]$/.test(k) && !checked) tap(k);
});

$('btnCheck').onclick = checkAnswer;
function checkAnswer() {
  if (checked) return; checked = true;
  let ok = true;
  $('wordDisplay').querySelectorAll('.letter-blank').forEach(b => {
    const i = +b.dataset.index;
    const pass = (userAnswers[i] || '') === currentWord.english[i];
    b.classList.add(pass ? 'correct' : 'wrong');
    if (!pass) { b.textContent = currentWord.english[i]; ok = false; }
  });
  const fb = $('feedback');
  if (ok) {
    fb.textContent = '🎉 정답이에요!'; fb.className = 'feedback correct';
    $('correctCount').textContent = +$('correctCount').textContent + 1;
    sessionResults.push({ word: currentWord, correct: true });
    $('btnCheck').style.display = 'none';
    setTimeout(nextWord, 1200);
  } else {
    retryCount++;
    if (retryCount < 3) {
      fb.textContent = '💡 다시 도전! (빈칸 위치가 바뀌었어요)'; fb.className = 'feedback wrong';
      setTimeout(() => loadWord(true), 900);
    } else {
      fb.textContent = '💡 정답: ' + currentWord.english; fb.className = 'feedback wrong';
      $('wrongCount').textContent = +$('wrongCount').textContent + 1;
      sessionResults.push({ word: currentWord, correct: false });
      $('btnCheck').style.display = 'none'; $('btnNext').style.display = 'block';
    }
  }
}

$('btnNext').onclick = nextWord;
$('btnQuit').onclick = () => {
  if (confirm('퀴즈를 종료하고 처음으로 돌아갈까요?')) {
    $('progressWrap').style.display = 'none';
    $('scoreBar').style.display = 'none';
    showScreen('setup');
  }
};


  
function nextWord() { currentIdx++; if (currentIdx >= shuffled.length) showResult(); else loadWord(false); }

async function showResult() {
  $('progressBar').style.width = '100%';
  const cor = sessionResults.filter(r => r.correct).length, tot = sessionResults.length, pct = cor/tot;
  $('resultEmoji').textContent = pct===1?'🏆':pct>=.7?'🎉':pct>=.4?'💪':'📚';
  $('resultTitle').textContent = isRetry ? '오답 재도전 완료!' : (isWrongMode ? '오답노트 완료!' : '학습 완료!');
  $('resultScore').textContent = cor + ' / ' + tot;
  const list = $('resultList'); list.innerHTML = '';
  sessionResults.forEach(r => {
    const d = document.createElement('div');
    d.className = 'result-item ' + (r.correct ? 'ok' : 'fail');
    const wc = r.word.wrong_count ? `<span class="wc-badge">누적 ${r.word.wrong_count}회</span>` : '';
    d.innerHTML = `<span>${r.correct?'✅':'❌'} ${r.word.korean}${wc}</span><span class="word-ans">${r.word.english}</span>`;
    list.appendChild(d);
  });
  const wn = sessionResults.filter(r => !r.correct).length;
  $('btnRetryWrong').disabled    = wn === 0;
  $('btnRetryWrong').textContent = wn > 0 ? `❌ 오답 ${wn}개 다시` : '✅ 오답 없음';
  showScreen('result');

  $('savingMsg').textContent = '📡 오답노트 저장 중…';
  try {
    const res = await apiFetch('recordResult', {
      payload: JSON.stringify({
        results: sessionResults.map(r => ({
          english: r.word.english,
          korean:  r.word.korean,
          lesson:  r.word.lesson,
          correct: r.correct
        }))
      })
    });
    if (res.error) throw new Error(res.error);
    $('savingMsg').textContent = '✅ 오답노트가 시트에 저장됐어요!';
  } catch(e) {
    $('savingMsg').textContent = '⚠️ 저장 실패: ' + e.message;
  }
}

$('btnRetryWrong').onclick = () => {
  const bad = sessionResults.filter(r => !r.correct).map(r => r.word);
  if (bad.length) startSession(bad, true);
};
$('btnAgain').onclick = () => startSession(quizWords, false);
$('btnHome').onclick  = async () => {
  $('progressWrap').style.display = 'none';
  $('scoreBar').style.display = 'none';
  showScreen('setup');
  try {
    const wr = await apiFetch('getWrong');
    allWrong = wr.wrong || [];
    renderWrongSection();
  } catch(_) {}
};

// ── API: 모두 GET으로 통일 (CORS 문제 없음) ──
async function apiFetch(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${API_URL}?${qs}`);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

function showScreen(n) {
  $('setupScreen').style.display  = n==='setup'  ? 'flex' : 'none';
  $('quizScreen').style.display   = n==='quiz'   ? 'flex' : 'none';
  $('resultScreen').style.display = n==='result' ? 'flex' : 'none';
}
function setLoading(on, msg='') {
  $('loadingOverlay').style.display = on ? 'flex' : 'none';
  $('loadingMsg').textContent = msg;
  $('btnLoad').disabled  = on;
  $('btnStart').disabled = on || !selectedLesson;
}
function setErr(m, isErr) {
  const el = $('setupError');
  el.textContent = m;
  el.className = 'setup-error ' + (isErr ? 'err' : 'ok');
}
function $(id) { return document.getElementById(id); }
function shuffle(a) { return [...a].sort(() => Math.random() - .5); }
</script>
